# Прогон тестового набора SI-HYX.
#
# Windows выбран не для галочки: приложение живёт только под Windows, а часть
# кода (пути %APPDATA%, taskbar, SHFileOperation, кодировки консоли) на других
# ОС ведёт себя иначе — зелёный прогон на Linux ничего бы не гарантировал.
#
# QT_QPA_PLATFORM=offscreen — тесты создают настоящий QApplication, но у
# раннера нет рабочего стола.
name: Тесты

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Новый пуш в ту же ветку отменяет предыдущий незавершённый прогон.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # Версия, на которой проект разрабатывается и собирается релиз.
          python-version: '3.14'
          cache: pip

      - name: Установить зависимости
        # Ставим весь requirements.txt целиком, а не урезанный список: заодно
        # проверяется, что файл вообще устанавливается на чистой машине.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pyflakes

      - name: Тесты
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONIOENCODING: utf-8
        run: python -m pytest

      - name: Гигиена кода
        # Star-импорты, неявная кодировка, голые except — всё, что тесты
        # поймать не могут. Тот же скрипт запускается локально:
        #   python tools/check_hygiene.py
        env:
          PYTHONIOENCODING: utf-8
        run: python tools/check_hygiene.py
